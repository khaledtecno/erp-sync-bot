name: ERPNext Sync Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # تم التحديث هنا لـ v4

      - name: Set up Python
        uses: actions/setup-python@v5 # تم التحديث هنا لـ v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Sync Script
        run: python sync_bot.py
